<!-- ── CHAT INTERFACE ── -->
<div class="chat-wrapper">

  <!-- Chat Header -->
  <div class="chat-header">
    <div class="chat-avatar">👩‍🦱</div>
    <div class="chat-header-info">
      <h3>Mrs. Nining</h3>
      <div class="chat-status">
        <div class="status-dot"></div>
        <span data-id="Online — Siap membantu kamu!" data-en="Online — Here for you!">Online — Siap membantu kamu!</span>
      </div>
      <div class="chat-header-title" data-id="Stylist Pribadi GoO Ninks" data-en="GoO Ninks Personal Stylist">Stylist Pribadi GoO Ninks</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <a href="tryon.html" class="btn btn-outline-white btn-sm" style="font-size:0.72rem;padding:6px 14px;" data-id="Virtual Try-On" data-en="Virtual Try-On">✨ Try-On</a>
      <a href="catalog.html" class="btn btn-gold btn-sm" style="font-size:0.72rem;padding:6px 14px;" data-id="Lihat Koleksi" data-en="View Collection">Lihat Koleksi</a>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <!-- Quick Replies -->
    <div class="quick-replies">
      <button class="quick-btn"
        data-id="Produk apa yang cocok buat kondangan?"
        data-en="What suits a formal event?">Produk apa yang cocok buat kondangan?</button>
      <button class="quick-btn"
        data-id="Saran warna untuk kulit sawo matang"
        data-en="Colors for warm skin tones">Saran warna untuk kulit sawo matang</button>
      <button class="quick-btn"
        data-id="Ceritain tentang Tenun Ikat"
        data-en="Tell me about Tenun Ikat">Ceritain tentang Tenun Ikat</button>
      <button class="quick-btn"
        data-id="Saran outfit formal"
        data-en="Formal outfit advice">Saran outfit formal</button>
      <button class="quick-btn"
        data-id="Ceritain tentang Batik"
        data-en="Tell me about Batik">Ceritain tentang Batik</button>
    </div>

    <!-- Input Row -->
    <div class="chat-input-row">
      <input
        type="text"
        class="chat-input"
        id="chatInput"
        data-placeholder-id="Tanya apapun ke Mrs. Nining..."
        data-placeholder-en="Ask Mrs. Nining anything..."
        placeholder="Tanya apapun ke Mrs. Nining...">
      <button class="chat-send" id="sendBtn" title="Kirim">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="chat-ai-note" data-id="(Mrs. Nining akan segera aktif dengan Gemini AI)" data-en="(Mrs. Nining will soon be powered by Gemini AI)">(Mrs. Nining akan segera aktif dengan Gemini AI)</div>
  </div>

</div>
